<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 15px; margin: 0;
        }
        input, textarea, button {
            width: 100%; box-sizing: border-box;
            padding: 12px; margin-top: 10px;
            border-radius: 8px; font-size: 16px;
            border: 1px solid var(--tg-theme-hint-color, #ccc);
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
        }
        textarea { resize: vertical; min-height: 100px; }
        button {
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none; font-weight: bold; cursor: pointer;
        }
        .header { font-size: 18px; font-weight: bold; margin-bottom: 10px; text-align: center;}
    </style>
</head>
<body>
    <div class="header">Отправить в MAX</div>
    
    <input type="text" id="chatId" placeholder="ID чата (например: 123)">
    <textarea id="messageText" placeholder="Напиши текст ответа..."></textarea>
    
    <button onclick="sendToBot()">Отправить</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Растягиваем на весь экран

        function sendToBot() {
            let chatId = document.getElementById('chatId').value;
            let text = document.getElementById('messageText').value;

            if (!chatId || !text) {
                tg.showAlert("Заполни все поля!");
                return;
            }

            // Формируем пакет данных
            let dataPackage = {
                action: "send_to_max",
                chat_id: chatId,
                text: text
            };

            // Отправляем данные в Телеграм и автоматически закрываем WebApp
            tg.sendData(JSON.stringify(dataPackage));
        }
    </script>
</body>
</html>
